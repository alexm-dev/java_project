name: Java CI Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Run integration tests
      run: mvn -B test

    - name: Package release JAR (tests already passed)
      run: mvn -B package -DskipTests

    - name: Generate JavaDocs
      run: mvn -B javadoc:javadoc

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: java
        build-mode: none

    - name: Analyze with CodeQL
      uses: github/codeql-action/analyze@v4

    - name: Stage submission
      run: |
        mkdir -p submission/ShareSpace
        cp -r src pom.xml submission/ShareSpace/
        cp README.md LICENSE submission/ShareSpace/ 2>/dev/null || true
        cp -r target/reports/apidocs submission/ShareSpace/javadoc
        find target -maxdepth 1 -name "*.jar" ! -name "original-*" -exec cp {} submission/ShareSpace/ \;
        cp doc/sharespace_doc.pdf submission/ShareSpace/ 2>/dev/null || true

    - name: Upload JAR
      uses: actions/upload-artifact@v7
      with:
        name: app
        path: |
          target/*.jar
          !target/original-*.jar

    - name: Upload JavaDocs
      uses: actions/upload-artifact@v7
      with:
        name: javadocs
        path: target/reports/apidocs/

    - name: Upload Submission Package
      uses: actions/upload-artifact@v7
      with:
        name: ShareSpace-submission
        path: submission/ShareSpace/
